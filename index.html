<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BGer DB">
<title>BGer Entscheid-Datenbank</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#e8e8e6;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#ddd;
  --blue:#1a6bb5;--blue-bg:#e8f1fb;
  --green:#0a6e50;--green-bg:#e0f4ec;
  --red:#b52020;--red-bg:#fbeaea;
  --yellow:#7a5500;--yellow-bg:#fdf3dc;
  --r:8px;--rl:14px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:#444}
}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;width:100%;outline:none}
textarea{resize:vertical;min-height:90px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* HEADER */
#header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 0}
#header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
#header-top h1{font-size:17px;font-weight:700}
#header-top small{font-size:12px;color:var(--text3);display:block;margin-top:2px}
#btn-new{background:var(--blue-bg);color:var(--blue);border:1px solid #b3d0f0;border-radius:var(--r);padding:8px 14px;font-size:14px;font-weight:600}
#searchbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;width:100%;font-size:15px;margin-bottom:10px}
#tabs{display:flex;border-top:1px solid var(--border);margin:0 -16px}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* MAIN */
#main{padding:12px 16px 100px;max-width:680px;margin:0 auto}

/* GROUPS */
.grp{margin-bottom:6px}
.grp-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer}
.grp-hdr .arr{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.grp-hdr .arr.open{transform:rotate(90deg)}
.grp-hdr .lbl{flex:1;font-size:14px;font-weight:600}
.grp-hdr .cnt{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 8px}
.grp-body{padding-left:8px;margin-top:4px}
.sub{margin-bottom:5px}
.sub-hdr{display:flex;align-items:center;gap:8px;padding:6px 10px;border-left:2px solid var(--border)}
.sub-hdr .lbl{flex:1;font-size:13px;font-weight:500}
.btn-add{font-size:12px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px 10px}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;margin-left:10px;overflow:hidden}
.card-hdr{display:flex;align-items:center;gap:6px;padding:10px 10px}
.card-arr{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .2s;cursor:pointer}
.card-arr.open{transform:rotate(90deg)}
.card-num{font-weight:600;font-size:13px;flex:1;cursor:pointer}
.dot-green{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.tag{font-size:10px;background:var(--blue-bg);color:var(--blue);border:1px solid #b3d0f0;border-radius:999px;padding:2px 7px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.card-btn-edit{font-size:18px;padding:4px 7px;color:var(--text2)}
.card-btn-del{font-size:18px;padding:4px 7px;color:var(--red)}
.card-body{border-top:1px solid var(--border);padding:10px 10px 12px 26px}
.card-comment{font-size:13px;line-height:1.65;margin-bottom:8px}
.card-links{display:flex;gap:14px;flex-wrap:wrap}
.card-links a{font-size:12px;color:var(--blue);text-decoration:none}
.card-links a.sec{color:var(--text2)}
.card-date{font-size:11px;color:var(--text3);margin-top:6px}
.empty{font-size:12px;color:var(--text3);padding:4px 10px 8px 12px}
.hint{text-align:center;font-size:13px;color:var(--text3);padding:30px 0}

/* BANNER */
.banner{background:var(--yellow-bg);border:1px solid #e0c060;border-radius:var(--r);padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.banner p{flex:1;font-size:13px;color:var(--yellow)}
.btn-mig{background:var(--yellow-bg);color:var(--yellow);border:1px solid #c09030;border-radius:var(--r);padding:5px 12px;font-size:13px;font-weight:600}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:12px}
.toolbar button{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px;font-size:13px;color:var(--text2)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 14px}
.sheet-title{font-size:16px;font-weight:700;padding:0 16px 12px;border-bottom:1px solid var(--border)}
.sheet-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.row{display:flex;gap:8px}
.row input{flex:1}
.btn-lookup{background:var(--blue-bg);color:var(--blue);border:1px solid #b3d0f0;border-radius:var(--r);padding:9px 12px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0}
.sheet-footer{display:flex;gap:8px;padding:12px 16px 0}
.btn-cancel{flex:1;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:15px;font-weight:500}
.btn-save{flex:2;background:var(--green-bg);color:var(--green);border:1px solid #7ecfb0;border-radius:var(--r);padding:12px;font-size:15px;font-weight:700}
.btn-save:disabled{opacity:.4}

/* DEL SHEET */
.del-sheet{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;width:100%;padding:0 16px env(safe-area-inset-bottom,16px)}
.del-text{text-align:center;padding:20px 0 16px;font-size:15px}
.del-btns{display:flex;gap:8px;padding-bottom:4px}
.btn-del-confirm{flex:1;background:var(--red-bg);color:var(--red);border:1px solid #f0aaaa;border-radius:var(--r);padding:12px;font-size:15px;font-weight:700}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}

/* FAB */
.fab{position:fixed;right:16px;bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;font-size:18px;color:var(--text2);box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;z-index:9}

/* search result sections */
.res-section{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <h1>⚖️ BGer Entscheide</h1>
      <small id="sub">Wird geladen…</small>
    </div>
    <button id="btn-new">+ Neu</button>
  </div>
  <input id="searchbox" type="search" placeholder="Suche (Nummer, Stichwort, Rechtsgebiet…)">
  <div id="tabs">
    <div class="tab active" id="tab-browse">Rechtsgebiete</div>
    <div class="tab" id="tab-search">Suchergebnisse</div>
  </div>
</div>

<div id="main"></div>

<!-- Edit overlay -->
<div class="overlay" id="edit-overlay">
  <div class="sheet" id="edit-sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="edit-title">Neuer Entscheid</div>
    <div class="sheet-body">
      <div class="field">
        <label>Urteilsnummer</label>
        <div class="row">
          <input id="f-num" type="text" placeholder="z.B. 4A_123/2025">
          <button class="btn-lookup" id="btn-lookup">🔍 Link</button>
        </div>
      </div>
      <div class="field">
        <label>Rechtsgebiet</label>
        <select id="f-kat"></select>
      </div>
      <div class="field">
        <label>Schlagwörter (max. 2, kommagetrennt)</label>
        <input id="f-tags" type="text" placeholder="z.B. Verjährung, Kausalität">
      </div>
      <div class="field">
        <label>Datum (optional)</label>
        <input id="f-dat" type="text" placeholder="z.B. 30.01.2026">
      </div>
      <div class="field">
        <label>Link <span id="f-url-ok" style="color:var(--green);font-size:11px;margin-left:6px"></span></label>
        <input id="f-url" type="url" placeholder="https://… (automatisch oder manuell)">
      </div>
      <div class="field">
        <label>Kommentar</label>
        <textarea id="f-kom" placeholder="Leitsatz, Kernaussage, Prozesstipps…"></textarea>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn-cancel" id="btn-edit-cancel">Abbrechen</button>
      <button class="btn-save" id="btn-edit-save" disabled>Speichern</button>
    </div>
  </div>
</div>

<!-- Delete overlay -->
<div class="overlay" id="del-overlay">
  <div class="del-sheet">
    <div class="handle"></div>
    <div class="del-text" id="del-text">Löschen?</div>
    <div class="del-btns">
      <button class="btn-cancel" id="btn-del-cancel">Abbrechen</button>
      <button class="btn-del-confirm" id="btn-del-confirm">Löschen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="fab" id="fab">↑</button>

  {id:"e112",nummer:"2C_318/2024",kategorie:"172",tags:["Verbände","Beschwerdelegitimation"],kommentar:"Beschwerdelegitimation von Verbänden.",datum:"",url:""},

// ─── State ────────────────────────────────────────────────────────────────────
const KEY = 'bger_v4';
let DB = [];
let expanded = {};
let openCards = {};
let tab = 'browse';
let q = '';
let editId = null;
let delId = null;
let migPending = false;
let toastTimer = null;

// ─── Storage ──────────────────────────────────────────────────────────────────
function loadDB() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) {
      DB = JSON.parse(s);
      migPending = DB.some(e => !VALID_IDS.has(e.kategorie) && KAT_MIG[e.kategorie]);
    } else {
      DB = JSON.parse(JSON.stringify(INITIAL));
    }
  } catch(e) { DB = JSON.parse(JSON.stringify(INITIAL)); }
}
function saveDB() { try { localStorage.setItem(KEY, JSON.stringify(DB)); } catch(e) {} }

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bgerLink(num) {
  return `https://search.bger.ch/ext/eurospider/live/de/php/aza/http/index.php?lang=de&type=simple_query&query_words=${encodeURIComponent(num)}`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('sub').textContent = DB.length + ' Entscheide';
  let h = '';

  if (migPending) {
    h += `<div class="banner"><p>Gespeicherte Einträge verwenden alte Kategorien.</p><button class="btn-mig" id="btn-mig">Migrieren</button></div>`;
  }

  h += `<div class="toolbar">
    <button id="btn-exp">📤 Export</button>
    <button id="btn-imp">📥 Import</button>
  </div>`;

  if (tab === 'search') {
    if (q.length < 2) {
      h += `<div class="hint">Mindestens 2 Zeichen eingeben…</div>`;
    } else {
      const byText = DB.filter(e =>
        e.nummer.toLowerCase().includes(q) ||
        e.kommentar.toLowerCase().includes(q) ||
        (e.tags||[]).some(t => t.toLowerCase().includes(q))
      );
      const matchKats = FLAT_KATS.filter(s => s.label.toLowerCase().includes(q)).map(s => s.id);
      const byKat = matchKats.length ? DB.filter(e => matchKats.includes(e.kategorie) && !byText.find(r => r.id===e.id)) : [];
      const total = byText.length + byKat.length;
      if (!total) {
        h += `<div class="hint">Keine Treffer für „${esc(q)}"</div>`;
      } else {
        h += `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">${total} Treffer</div>`;
        if (byText.length) {
          h += `<div class="res-section">Inhalt / Nummer / Schlagwort</div>`;
          byText.forEach(e => { h += cardHTML(e, true); });
        }
        if (byKat.length) {
          const kl = [...new Set(matchKats.filter(id => byKat.some(e=>e.kategorie===id)).map(id=>katLabel(id)))].join(', ');
          h += `<div class="res-section">Rechtsgebiet: ${esc(kl)}</div>`;
          byKat.forEach(e => { h += cardHTML(e, true); });
        }
      }
    }
  } else {
    SR.forEach(g => {
      const allIds = g.sub.map(s => s.id);
      const cnt = DB.filter(e => allIds.includes(e.kategorie)).length;
      const isOpen = expanded[g.id];
      h += `<div class="grp">
        <div class="grp-hdr" data-grp="${esc(g.id)}">
          <span class="arr ${isOpen?'open':''}">▶</span>
          <span class="lbl">${esc(g.label)}</span>
          <span class="cnt">${cnt}</span>
        </div>`;
      if (isOpen) {
        h += `<div class="grp-body">`;
        g.sub.forEach(sub => {
          const es = DB.filter(e => e.kategorie === sub.id);
          h += `<div class="sub">
            <div class="sub-hdr">
              <span class="lbl">${esc(sub.label)}</span>
              <button class="btn-add" data-add="${esc(sub.id)}">+ Neu</button>
            </div>`;
          if (!es.length) {
            h += `<div class="empty">Noch keine Einträge</div>`;
          } else {
            es.forEach(e => { h += cardHTML(e, false); });
          }
          h += `</div>`;
        });
        h += `</div>`;
      }
      h += `</div>`;
    });
  }

  document.getElementById('main').innerHTML = h;
  bindEvents();
}

function cardHTML(e, showKat) {
  const open = openCards[e.id];
  const tags = (e.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const linked = e.url ? `<span class="dot-green" title="Verlinkt"></span>` : '';
  const kat = showKat ? `<span style="font-size:10px;color:var(--text3);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(katLabel(e.kategorie))}</span>` : '';
  let body = '';
  if (open) {
    const linkMain = e.url
      ? `<a href="${esc(e.url)}" target="_blank">🔗 opencaselaw.ch</a>`
      : `<a href="${esc(bgerLink(e.nummer))}" target="_blank" class="sec">🔍 BGer Suche</a>`;
    body = `<div class="card-body">
      ${e.kommentar ? `<div class="card-comment">${esc(e.kommentar)}</div>` : ''}
      <div class="card-links">${linkMain}<a href="${esc(bgerLink(e.nummer))}" target="_blank" class="sec">BGer Suche</a></div>
      ${e.datum ? `<div class="card-date">${esc(e.datum)}</div>` : ''}
    </div>`;
  }
  return `<div class="card" id="card-${esc(e.id)}">
    <div class="card-hdr">
      <span class="card-arr ${open?'open':''}" data-toggle="${esc(e.id)}">▶</span>
      <span class="card-num" data-toggle="${esc(e.id)}">${esc(e.nummer)}</span>
      ${linked}${tags}${kat}
      <button class="card-btn-edit" data-edit="${esc(e.id)}" type="button">✏️</button>
      <button class="card-btn-del" data-del="${esc(e.id)}" type="button">🗑️</button>
    </div>
    ${body}
  </div>`;
}

// ─── Event binding (fresh on every render) ────────────────────────────────────
function bindEvents() {
  // Group toggles
  document.querySelectorAll('[data-grp]').forEach(el => {
    el.addEventListener('click', function() {
      const id = this.dataset.grp;
      expanded[id] = !expanded[id];
      render();
    });
  });
  // Add buttons
  document.querySelectorAll('[data-add]').forEach(el => {
    el.addEventListener('click', function(ev) {
      ev.stopPropagation();
      openAdd(this.dataset.add);
    });
  });
  // Card toggles
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', function() {
      const id = this.dataset.toggle;
      openCards[id] = !openCards[id];
      render();
    });
  });
  // Edit buttons
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', function(ev) {
      ev.stopPropagation();
      openEditModal(this.dataset.edit);
    });
  });
  // Delete buttons
  document.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', function(ev) {
      ev.stopPropagation();
      openDelModal(this.dataset.del);
    });
  });
  // Migration
  const bm = document.getElementById('btn-mig');
  if (bm) bm.addEventListener('click', runMigration);
  // Export/Import
  const be = document.getElementById('btn-exp');
  if (be) be.addEventListener('click', doExport);
  const bi = document.getElementById('btn-imp');
  if (bi) bi.addEventListener('click', doImport);
}

// ─── Edit modal ───────────────────────────────────────────────────────────────
function buildSelect(selVal) {
  let h = '<option value="">— Rechtsgebiet wählen —</option>';
  SR.forEach(g => {
    h += `<optgroup label="${esc(g.label)}">`;
    g.sub.forEach(s => { h += `<option value="${s.id}"${s.id===selVal?' selected':''}>${esc(s.label)}</option>`; });
    h += '</optgroup>';
  });
  document.getElementById('f-kat').innerHTML = h;
}

function openAdd(katId) {
  editId = 'new';
  document.getElementById('edit-title').textContent = 'Neuer Entscheid';
  buildSelect(katId||'');
  document.getElementById('f-num').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-dat').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-url-ok').textContent = '';
  document.getElementById('f-kom').value = '';
  document.getElementById('btn-edit-save').disabled = true;
  document.getElementById('edit-overlay').classList.add('show');
  setTimeout(() => document.getElementById('f-num').focus(), 100);
}

function openEditModal(id) {
  const e = DB.find(x => x.id === id);
  if (!e) return;
  editId = id;
  document.getElementById('edit-title').textContent = 'Entscheid bearbeiten';
  buildSelect(e.kategorie||'');
  document.getElementById('f-num').value = e.nummer||'';
  document.getElementById('f-tags').value = (e.tags||[]).join(', ');
  document.getElementById('f-dat').value = e.datum||'';
  document.getElementById('f-url').value = e.url||'';
  document.getElementById('f-url-ok').textContent = e.url ? '✓ gesetzt' : '';
  document.getElementById('f-kom').value = e.kommentar||'';
  document.getElementById('btn-edit-save').disabled = false;
  document.getElementById('edit-overlay').classList.add('show');
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('show');
  editId = null;
}

function checkSaveBtn() {
  const ok = document.getElementById('f-num').value.trim() && document.getElementById('f-kat').value;
  document.getElementById('btn-edit-save').disabled = !ok;
}

function doSave() {
  const num = document.getElementById('f-num').value.trim();
  const kat = document.getElementById('f-kat').value;
  if (!num || !kat) return;
  const entry = {
    id: editId === 'new' ? 'e' + Date.now() : editId,
    nummer: num,
    kategorie: kat,
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean).slice(0,2),
    datum: document.getElementById('f-dat').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    kommentar: document.getElementById('f-kom').value.trim(),
  };
  if (editId === 'new') { DB.push(entry); }
  else { const i = DB.findIndex(x=>x.id===editId); if(i>=0) DB[i]=entry; }
  saveDB();
  closeEdit();
  render();
  toast(editId==='new'?'Entscheid hinzugefügt':'Gespeichert');
}

function doLookup() {
  const num = document.getElementById('f-num').value.trim();
  if (!num) return;
  const m = num.match(/^(\d[A-Z]{1,2})_(\d+)\/(\d{4})$/i);
  if (m) {
    const url = `https://mcp.opencaselaw.ch/entscheid/bger_${m[1].toLowerCase()}_${m[2]}_${m[3]}`;
    document.getElementById('f-url').value = url;
    document.getElementById('f-url-ok').textContent = '✓ gesetzt';
    toast('Link gesetzt ✓');
  } else {
    window.open(`https://search.bger.ch/ext/eurospider/live/de/php/aza/http/index.php?lang=de&type=simple_query&query_words=${encodeURIComponent(num)}`, '_blank');
    toast('BGer Suche geöffnet');
  }
}

// ─── Delete modal ─────────────────────────────────────────────────────────────
function openDelModal(id) {
  delId = id;
  const e = DB.find(x=>x.id===id);
  document.getElementById('del-text').textContent = `„${e?e.nummer:id}" wirklich löschen?`;
  document.getElementById('del-overlay').classList.add('show');
}
function closeDel() {
  document.getElementById('del-overlay').classList.remove('show');
  delId = null;
}
function doDel() {
  DB = DB.filter(x=>x.id!==delId);
  saveDB(); closeDel(); render(); toast('Gelöscht');
}

// ─── Migration ────────────────────────────────────────────────────────────────
function runMigration() {
  DB = DB.map(e => ({...e, kategorie: KAT_MIG[e.kategorie]||e.kategorie}));
  migPending = false; saveDB(); render(); toast('Migration abgeschlossen');
}

// ─── Export / Import ──────────────────────────────────────────────────────────
function doExport() {
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bger_entscheide.json';
  a.click();
}
function doImport() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = ev => {
    const f = ev.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = e => {
      try { DB=JSON.parse(e.target.result); saveDB(); render(); toast('Import erfolgreich'); }
      catch { toast('Fehler beim Import'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

// ─── Static button wiring ─────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', () => openAdd(null));
document.getElementById('btn-edit-cancel').addEventListener('click', closeEdit);
document.getElementById('btn-edit-save').addEventListener('click', doSave);
document.getElementById('btn-lookup').addEventListener('click', doLookup);
document.getElementById('btn-del-cancel').addEventListener('click', closeDel);
document.getElementById('btn-del-confirm').addEventListener('click', doDel);
document.getElementById('fab').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

document.getElementById('f-num').addEventListener('input', checkSaveBtn);
document.getElementById('f-kat').addEventListener('change', checkSaveBtn);
document.getElementById('f-url').addEventListener('input', function() {
  document.getElementById('f-url-ok').textContent = this.value.trim() ? '✓ gesetzt' : '';
});

document.getElementById('searchbox').addEventListener('input', function() {
  q = this.value.trim().toLowerCase();
  if (q.length >= 2) { tab='search'; document.getElementById('tab-browse').classList.remove('active'); document.getElementById('tab-search').classList.add('active'); }
  else { tab='browse'; document.getElementById('tab-browse').classList.add('active'); document.getElementById('tab-search').classList.remove('active'); }
  render();
});

document.getElementById('tab-browse').addEventListener('click', function() {
  tab='browse'; q=''; document.getElementById('searchbox').value='';
  this.classList.add('active'); document.getElementById('tab-search').classList.remove('active');
  render();
});
document.getElementById('tab-search').addEventListener('click', function() {
  tab='search';
  this.classList.add('active'); document.getElementById('tab-browse').classList.remove('active');
  render();
});

// Close overlays on background tap
document.getElementById('edit-overlay').addEventListener('click', function(ev) {
  if (ev.target === this) closeEdit();
});
document.getElementById('del-overlay').addEventListener('click', function(ev) {
  if (ev.target === this) closeDel();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadDB();
render();
</script>
</body>
