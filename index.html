<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BGer DB">
<title>BGer Entscheid-Datenbank</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeece8;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue: #185fa5; --blue-bg: #e6f1fb; --blue-border: rgba(24,95,165,0.3);
    --green: #0f6e56; --green-bg: #e1f5ee; --green-border: rgba(15,110,86,0.3);
    --warn: #854f0b; --warn-bg: #faeeda; --warn-border: rgba(133,79,11,0.3);
    --danger: #a32d2d; --danger-bg: #fcebeb; --danger-border: rgba(163,45,45,0.3);
    --radius: 8px; --radius-lg: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --blue: #64b5f6; --blue-bg: rgba(24,95,165,0.2); --blue-border: rgba(100,181,246,0.3);
      --green: #5dcaa5; --green-bg: rgba(15,110,86,0.2); --green-border: rgba(93,202,165,0.3);
      --warn: #efae6a; --warn-bg: rgba(133,79,11,0.2); --warn-border: rgba(239,174,106,0.3);
      --danger: #f09595; --danger-bg: rgba(163,45,45,0.2); --danger-border: rgba(240,149,149,0.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
  /* Header */
  .header { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 0.5px solid var(--border); padding: calc(var(--safe-top) + 12px) 16px 12px; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header .sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  /* Search bar */
  .searchbar { display: flex; gap: 8px; margin-top: 10px; }
  .searchbar input { flex: 1; background: var(--bg2); border: none; border-radius: var(--radius); padding: 8px 12px; font-size: 15px; color: var(--text); outline: none; }
  .searchbar input::placeholder { color: var(--text3); }
  .btn-new { background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--blue-border); border-radius: var(--radius); padding: 8px 14px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  /* Nav tabs */
  .tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); margin-top: 10px; }
  .tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }
  /* Main content */
  .main { padding: 12px 16px calc(var(--safe-bottom) + 80px); max-width: 680px; margin: 0 auto; }
  /* Group */
  .group { margin-bottom: 6px; }
  .group-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border); }
  .group-header .arrow { font-size: 11px; color: var(--text3); transition: transform .2s; }
  .group-header .arrow.open { transform: rotate(90deg); }
  .group-header .label { flex: 1; font-size: 14px; font-weight: 500; }
  .group-header .count { font-size: 11px; background: var(--bg); color: var(--text2); border: 0.5px solid var(--border); border-radius: 999px; padding: 2px 8px; }
  .group-body { padding-left: 8px; margin-top: 4px; }
  /* Subgroup */
  .subgroup { margin-bottom: 5px; }
  .subgroup-header { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-left: 2px solid var(--border); }
  .subgroup-header .label { flex: 1; font-size: 13px; font-weight: 500; }
  .btn-add-sub { font-size: 12px; color: var(--text2); background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px 10px; cursor: pointer; }
  /* Card */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 5px; margin-left: 10px; overflow: hidden; }
  .card-header { display: flex; align-items: center; gap: 6px; padding: 9px 10px; cursor: pointer; }
  .card-arrow { font-size: 10px; color: var(--text3); flex-shrink: 0; transition: transform .2s; }
  .card-arrow.open { transform: rotate(90deg); }
  .card-num { font-weight: 600; font-size: 13px; flex: 1; }
  .tag { font-size: 10px; background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--blue-border); border-radius: 999px; padding: 2px 7px; white-space: nowrap; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .linked-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .card-actions { display: flex; gap: 0; }
  .card-btn { background: transparent; border: none; cursor: pointer; padding: 4px 7px; font-size: 16px; color: var(--text2); }
  .card-btn.del { color: var(--danger); }
  .card-body { border-top: 0.5px solid var(--border); padding: 10px 10px 12px 26px; }
  .card-comment { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
  .card-links { display: flex; gap: 14px; flex-wrap: wrap; }
  .card-links a { font-size: 12px; color: var(--blue); text-decoration: none; }
  .card-links a.fallback { color: var(--text2); }
  .card-date { font-size: 11px; color: var(--text3); margin-top: 6px; }
  /* Edit modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; }
  .modal { background: var(--bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 0 0 calc(var(--safe-bottom) + 16px); width: 100%; max-height: 92vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 14px; }
  .modal-title { font-size: 16px; font-weight: 600; padding: 0 16px 12px; border-bottom: 0.5px solid var(--border); }
  .modal-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius);
    padding: 9px 11px; font-size: 15px; color: var(--text); outline: none; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .field .row { display: flex; gap: 8px; }
  .field .row input { flex: 1; }
  .btn-lookup { background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--blue-border); border-radius: var(--radius); padding: 9px 12px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-lookup:disabled { opacity: 0.5; }
  .modal-footer { display: flex; gap: 8px; padding: 12px 16px 0; }
  .btn-cancel { flex: 1; background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 11px; font-size: 15px; cursor: pointer; }
  .btn-save { flex: 2; background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green-border); border-radius: var(--radius); padding: 11px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-save:disabled { opacity: 0.4; }
  /* Delete confirm */
  .del-modal { background: var(--bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px 16px calc(var(--safe-bottom) + 16px); width: 100%; }
  .del-modal p { font-size: 15px; margin-bottom: 16px; text-align: center; }
  .del-modal .actions { display: flex; gap: 8px; }
  /* Toast */
  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 9px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 200; white-space: nowrap; transition: opacity .3s; pointer-events: none; }
  .toast.hidden { opacity: 0; }
  /* Search results */
  .search-hint { font-size: 13px; color: var(--text3); text-align: center; padding: 24px 0; }
  /* Migration banner */
  .banner { background: var(--warn-bg); border: 0.5px solid var(--warn-border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .banner p { flex: 1; font-size: 13px; color: var(--warn); }
  .btn-migrate { background: var(--warn-bg); color: var(--warn); border: 0.5px solid var(--warn-border); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  /* Empty state */
  .empty { font-size: 12px; color: var(--text3); padding: 6px 10px 10px 12px; }
  /* Scroll to top fab */
  .fab { position: fixed; right: 16px; bottom: calc(var(--safe-bottom) + 16px); background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--text2); z-index: 40; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <h1>⚖️ BGer Entscheide</h1>
      <div class="sub" id="subtitle">Wird geladen…</div>
    </div>
    <button class="btn-new" onclick="openAdd(null)">+ Neu</button>
  </div>
  <div class="searchbar">
    <input type="search" id="searchInput" placeholder="Suche (Nummer, Stichwort, Schlagwort…)" oninput="onSearch(this.value)">
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-browse" onclick="switchTab('browse')">Rechtsgebiete</div>
    <div class="tab" id="tab-search" onclick="switchTab('search')">Suchergebnisse</div>
  </div>
</div>

<div class="main" id="main"></div>

<div class="toast hidden" id="toast"></div>
<div class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<!-- Edit Modal -->
<div class="modal-overlay hidden" id="editOverlay" onclick="closeEditIfBg(event)">
  <div class="modal" id="editModal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editTitle">Neuer Entscheid</div>
    <div class="modal-body">
      <div class="field">
        <label>Urteilsnummer</label>
        <div class="row">
          <input type="text" id="f-nummer" placeholder="z.B. 4A_123/2025" oninput="updateSaveBtn()">
          <button class="btn-lookup" id="lookupBtn" onclick="doLookup()">🔍 Suchen</button>
        </div>
      </div>
      <div class="field">
        <label>Rechtsgebiet</label>
        <select id="f-kategorie" onchange="updateSaveBtn()"></select>
      </div>
      <div class="field">
        <label>Schlagwörter (max. 2, kommagetrennt)</label>
        <input type="text" id="f-tags" placeholder="z.B. Verjährung, Kausalität">
      </div>
      <div class="field">
        <label>Datum (optional)</label>
        <input type="text" id="f-datum" placeholder="z.B. 30.01.2026">
      </div>
      <div class="field">
        <label>Link <span id="linkPreview" style="font-size:11px;color:var(--green);margin-left:8px"></span></label>
        <input type="url" id="f-url" placeholder="https://… (automatisch oder manuell)" oninput="updateLinkPreview()">
      </div>
      <div class="field">
        <label>Kommentar</label>
        <textarea id="f-kommentar" placeholder="Leitsatz, Kernaussage, Prozesstipps…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEdit()">Abbrechen</button>
      <button class="btn-save" id="saveBtn" onclick="saveEntry()" disabled>Speichern</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay hidden" id="delOverlay">
  <div class="del-modal">
    <div class="modal-handle"></div>
    <p id="delText">Entscheid löschen?</p>
    <div class="actions">
      <button class="btn-cancel" style="flex:1" onclick="closeDelete()">Abbrechen</button>
      <button style="flex:1;background:var(--danger-bg);color:var(--danger);border:0.5px solid var(--danger-border);border-radius:var(--radius);padding:11px;font-size:15px;font-weight:600;cursor:pointer" onclick="confirmDelete()">Löschen</button>
    </div>
  </div>
</div>

  "17":"17","18":"18","anwalts1":"anwalts1","74b":"74b","741":"741","281":"281"

const VALID = new Set(SR.flatMap(g=>g.sub.map(s=>s.id)));

// ── Initialdaten ──────────────────────────────────────────────────────────────
const INITIAL = [
  {id:"e1",nummer:"5A_405/2025",kategorie:"211",tags:["Persönlichkeitsverletzung","Medien"],kommentar:"Persönlichkeitsverletzung und Medienberichterstattung (im Rahmen Gerichtsverfahren).",datum:"",url:""},

  {id:"e4",nummer:"5A_54/2024",kategorie:"212",tags:["Güterrecht","Aktienoptionen"],kommentar:"Güterrecht: Aktienoptionen als EG oder ER. Entscheidend ist der Zeitpunkt, in dem die Option von der Anwartschaft in das Recht auf die Aktien wechselt.",datum:"",url:""},

  {id:"e6",nummer:"5A_751/2024",kategorie:"212",tags:["Kinderunterhalt","Güterrecht"],kommentar:"Kinderunterhalt: Schulstufenmodell, Betreuungsunterhalt, Sparquote, Volljährigenunterhalt. Güterrecht: Eigengutberechnung.",datum:"",url:""},

  {id:"e111",nummer:"1C_454/2025",kategorie:"741",tags:["Führerausweis","Fahreignung"],kommentar:"Führerausweisentzug: Strafrecht (Fahrfähigkeit) vs. Verwaltungsrecht (Fahreignung). Verwaltungsgericht kann trotz Freispruch Ausweis entziehen bei nachgewiesenem Alkoholproblem.",datum:"",url:""},
  {id:"e112",nummer:"2C_318/2024",kategorie:"27",tags:["Verbände","Beschwerdelegitimation"],kommentar:"Beschwerdelegitimation von Verbänden.",datum:"",url:""},
];

// ── State ─────────────────────────────────────────────────────────────────────
let data = [];
let expanded = {};
let expandedCards = {};
let currentTab = 'browse';
let searchQ = '';
let editingId = null;
let deleteId = null;
let toastTimer = null;

// ── Storage ───────────────────────────────────────────────────────────────────
const STORE_KEY = 'bger_v3';
function loadData() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) {
      data = JSON.parse(s);
      const needsMig = data.some(e => !VALID.has(e.kategorie) && KAT_MIGRATION[e.kategorie]);
      if (needsMig) { migrationPending = true; }
    } else { data = JSON.parse(JSON.stringify(INITIAL)); }
  } catch { data = JSON.parse(JSON.stringify(INITIAL)); }
}
function saveData() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
let migrationPending = false;

// ── Export ────────────────────────────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'bger_entscheide.json'; a.click();
}
function importJSON() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try { data = JSON.parse(ev.target.result); saveData(); render(); showToast('Import erfolgreich'); }
      catch { showToast('Fehler beim Import'); }
    };
    r.readAsText(f);
  };
  input.click();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('subtitle').textContent = `${data.length} Entscheide`;
  const main = document.getElementById('main');
  let html = '';

  if (migrationPending) {
    html += `<div class="banner"><p>Gespeicherte Einträge verwenden alte Kategorien.</p><button class="btn-migrate" onclick="runMigration()">Migrieren</button></div>`;
  }

  // Export/Import row
  html += `<div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="exportJSON()" style="flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:8px;font-size:13px;color:var(--text2);cursor:pointer">📤 Exportieren</button>
    <button onclick="importJSON()" style="flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:8px;font-size:13px;color:var(--text2);cursor:pointer">📥 Importieren</button>
  </div>`;

  if (currentTab === 'search') {
    if (searchQ.length < 2) {
      html += `<div class="search-hint">Mindestens 2 Zeichen eingeben…</div>`;
    } else {
      const results = data.filter(e =>
        e.nummer.toLowerCase().includes(searchQ) ||
        e.kommentar.toLowerCase().includes(searchQ) ||
        (e.tags||[]).some(t => t.toLowerCase().includes(searchQ))
      );
      if (!results.length) html += `<div class="search-hint">Keine Treffer für „${esc(searchQ)}"</div>`;
      else {
        html += `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">${results.length} Treffer</div>`;
        results.forEach(e => { html += renderCard(e, true); });
      }
    }
  } else {
    SR.forEach(g => {
      const ids = g.sub.map(s => s.id);
      const cnt = data.filter(e => ids.includes(e.kategorie)).length;
      if (!cnt) return;
      const isOpen = expanded[g.id];
      html += `<div class="group">
        <div class="group-header" onclick="toggleGroup('${g.id}')">
          <span class="arrow ${isOpen?'open':''}">▶</span>
          <span class="label">${esc(g.label)}</span>
          <span class="count">${cnt}</span>
        </div>`;
      if (isOpen) {
        html += `<div class="group-body">`;
        g.sub.forEach(sub => {
          const es = data.filter(e => e.kategorie === sub.id);
          if (!es.length) return;
          html += `<div class="subgroup">
            <div class="subgroup-header">
              <span class="label">${esc(sub.label)}</span>
              <button class="btn-add-sub" onclick="openAdd('${sub.id}')">+ Hinzufügen</button>
            </div>`;
          es.forEach(e => { html += renderCard(e, false); });
          html += `</div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
  }
  main.innerHTML = html;
}

function renderCard(e, showKat) {
  const open = expandedCards[e.id];
  const tags = (e.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  const linked = e.url ? `<span class="linked-dot" title="Verlinkt"></span>` : '';
  const kat = showKat ? `<span style="font-size:10px;color:var(--text3);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(katLabel(e.kategorie))}</span>` : '';
  const bgerFallback = (() => {
    const m = e.nummer.match(/^(\d[A-Z]{1,2}_\d+\/\d{4})/);
    if (m) return `https://www.bger.ch/ext/eurospider/live/de/php/aza/http/index.php?lang=de&type=show_document&highlight_docid=aza%3A%2F%2Faza-www.bger.ch-${m[1].replace(/\//g,'-')}`;
    return `https://www.bger.ch/index/judicial/judicial-inherit-template/judicial-urteilsuche.htm?lang=de&query=${encodeURIComponent(e.nummer)}`;
  })();
  let body = '';
  if (open) {
    const linkHtml = e.url
      ? `<a href="${esc(e.url)}" target="_blank">🔗 opencaselaw.ch</a>`
      : `<a href="${esc(bgerFallback)}" target="_blank" class="fallback">🔍 BGer-Suche</a>`;
    body = `<div class="card-body">
      ${e.kommentar ? `<div class="card-comment">${esc(e.kommentar)}</div>` : ''}
      <div class="card-links">${linkHtml}<a href="https://opencaselaw.ch/search?q=${encodeURIComponent(e.nummer)}" target="_blank" class="fallback">Suche opencaselaw</a></div>
      ${e.datum ? `<div class="card-date">${esc(e.datum)}</div>` : ''}
    </div>`;
  }
  return `<div class="card">
    <div class="card-header" onclick="toggleCard('${e.id}')">
      <span class="card-arrow ${open?'open':''}">▶</span>
      <span class="card-num">${esc(e.nummer)}</span>
      ${linked}${tags}${kat}
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="card-btn" onclick="openEdit('${e.id}')" aria-label="Bearbeiten">✏️</button>
        <button class="card-btn del" onclick="openDelete('${e.id}')" aria-label="Löschen">🗑️</button>
      </div>
    </div>
    ${body}
  </div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Interactions ──────────────────────────────────────────────────────────────
function toggleGroup(id) { expanded[id] = !expanded[id]; render(); }
function toggleCard(id) { expandedCards[id] = !expandedCards[id]; render(); }

function switchTab(t) {
  currentTab = t;
  document.getElementById('tab-browse').className = 'tab' + (t==='browse'?' active':'');
  document.getElementById('tab-search').className = 'tab' + (t==='search'?' active':'');
  render();
}

function onSearch(v) {
  searchQ = v.trim().toLowerCase();
  if (searchQ.length >= 2) switchTab('search');
  else { switchTab('browse'); }
}

// ── Edit ──────────────────────────────────────────────────────────────────────
function buildSelect() {
  let html = '<option value="">— Rechtsgebiet wählen —</option>';
  SR.forEach(g => {
    html += `<optgroup label="${esc(g.label)}">`;
    g.sub.forEach(s => { html += `<option value="${s.id}">${esc(s.label)}</option>`; });
    html += '</optgroup>';
  });
  document.getElementById('f-kategorie').innerHTML = html;
}

function openAdd(katId) {
  editingId = 'new';
  document.getElementById('editTitle').textContent = 'Neuer Entscheid';
  buildSelect();
  document.getElementById('f-nummer').value = '';
  document.getElementById('f-kategorie').value = katId || '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-datum').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-kommentar').value = '';
  updateSaveBtn(); updateLinkPreview();
  document.getElementById('editOverlay').classList.remove('hidden');
}

function openEdit(id) {
  const e = data.find(x => x.id === id); if (!e) return;
  editingId = id;
  document.getElementById('editTitle').textContent = 'Entscheid bearbeiten';
  buildSelect();
  document.getElementById('f-nummer').value = e.nummer;
  document.getElementById('f-kategorie').value = e.kategorie;
  document.getElementById('f-tags').value = (e.tags||[]).join(', ');
  document.getElementById('f-datum').value = e.datum || '';
  document.getElementById('f-url').value = e.url || '';
  document.getElementById('f-kommentar').value = e.kommentar || '';
  updateSaveBtn(); updateLinkPreview();
  document.getElementById('editOverlay').classList.remove('hidden');
}

function closeEdit() { document.getElementById('editOverlay').classList.add('hidden'); }
function closeEditIfBg(ev) { if (ev.target === document.getElementById('editOverlay')) closeEdit(); }

function updateSaveBtn() {
  const ok = document.getElementById('f-nummer').value.trim() && document.getElementById('f-kategorie').value;
  document.getElementById('saveBtn').disabled = !ok;
}
function updateLinkPreview() {
  const u = document.getElementById('f-url').value.trim();
  document.getElementById('linkPreview').textContent = u ? '✓ gesetzt' : '';
}

async function doLookup() {
  const num = document.getElementById('f-nummer').value.trim();
  if (!num) return;
  const btn = document.getElementById('lookupBtn');
  btn.disabled = true; btn.textContent = '⏳ Suche…';
  try {
    const id = 'bger_' + num.replace(/\//g,'_').replace(/\s/g,'_').toLowerCase();
    const url = `https://mcp.opencaselaw.ch/entscheid/${id}`;
    // Quick HEAD check if URL exists
    const res = await fetch(`https://mcp.opencaselaw.ch/cite?reference=${encodeURIComponent(num)}`, {method:'GET'});
    if (res.ok) {
      const json = await res.json();
      if (json.canonical_url) {
        document.getElementById('f-url').value = json.canonical_url;
        if (json.decision_date) {
          const d = json.decision_date.split('T')[0].split('-');
          document.getElementById('f-datum').value = `${d[2]}.${d[1]}.${d[0]}`;
        }
        updateLinkPreview();
        showToast('Entscheid verlinkt ✓');
        btn.disabled = false; btn.textContent = '🔍 Suchen';
        return;
      }
    }
  } catch {}
  // Fallback: construct URL directly
  const m = num.match(/^(\d[A-Z]{1,2})_(\d+)\/(\d{4})$/);
  if (m) {
    document.getElementById('f-url').value = `https://mcp.opencaselaw.ch/entscheid/bger_${m[1].toLowerCase()}_${m[2]}_${m[3]}`;
    updateLinkPreview();
    showToast('Link gesetzt (Direktkonstruktion)');
  } else {
    showToast('Nicht gefunden – Link manuell setzen', true);
  }
  btn.disabled = false; btn.textContent = '🔍 Suchen';
}

function saveEntry() {
  const num = document.getElementById('f-nummer').value.trim();
  const kat = document.getElementById('f-kategorie').value;
  if (!num || !kat) return;
  const entry = {
    id: editingId === 'new' ? 'e' + Date.now() : editingId,
    nummer: num,
    kategorie: kat,
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean).slice(0,2),
    datum: document.getElementById('f-datum').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    kommentar: document.getElementById('f-kommentar').value.trim(),
  };
  if (editingId === 'new') data.push(entry);
  else { const i = data.findIndex(x=>x.id===editingId); if (i>=0) data[i]=entry; }
  saveData(); closeEdit(); render();
  showToast(editingId==='new' ? 'Entscheid hinzugefügt' : 'Gespeichert');
}

// ── Delete ────────────────────────────────────────────────────────────────────
function openDelete(id) {
  deleteId = id;
  const e = data.find(x=>x.id===id);
  document.getElementById('delText').textContent = `„${e?.nummer}" wirklich löschen?`;
  document.getElementById('delOverlay').classList.remove('hidden');
}
function closeDelete() { document.getElementById('delOverlay').classList.add('hidden'); deleteId=null; }
function confirmDelete() {
  data = data.filter(x=>x.id!==deleteId);
  saveData(); closeDelete(); render(); showToast('Gelöscht');
}

// ── Migration ─────────────────────────────────────────────────────────────────
function runMigration() {
  data = data.map(e => ({...e, kategorie: KAT_MIGRATION[e.kategorie] || e.kategorie}));
  migrationPending = false; saveData(); render(); showToast('Migration abgeschlossen');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, warn) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
render();
</script>
</body>
</html>
